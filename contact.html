<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --saffron:#FF6B2B; --gold:#D4AF37; --deep:#170905; --deep2:#2A0F08; --text:#2D1A0E; --muted:#8A6A5A; --border:#F0D9CC; --card-bg:#FFF8F3; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Hind',sans-serif; background:#FFF6EF; color:var(--text); }
  nav { background:linear-gradient(120deg,var(--deep),var(--deep2)); height:62px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; position:sticky; top:0; border-bottom:1px solid rgba(212,175,55,0.35); }
  .logo { font-family:'Baloo 2',cursive; font-size:21px; font-weight:800; color:#fff; }
  .logo span { color:var(--gold); }
  .nav-btn { padding:7px 16px; border-radius:8px; font-size:13px; font-weight:600; border:1.5px solid rgba(212,175,55,0.45); background:transparent; color:#fff; text-decoration:none; }
  .content { max-width:600px; margin:0 auto; padding:44px 24px 60px; text-align:center; }
  h1 { font-family:'Baloo 2',cursive; font-size:28px; margin-bottom:10px; }
  p.sub { color:var(--muted); font-size:15px; margin-bottom:32px; }
  .contact-card {
    background:white; border:1.5px solid var(--border); border-top:3px solid var(--gold);
    border-radius:16px; padding:22px; margin-bottom:14px; display:flex; align-items:center; gap:14px; text-align:left;
  }
  .contact-icon { font-size:26px; width:46px; height:46px; border-radius:50%; background:var(--card-bg); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .contact-card a { color:var(--saffron); font-weight:700; text-decoration:none; }
  .contact-label { font-size:12px; color:var(--muted); }
</style>
</head>
